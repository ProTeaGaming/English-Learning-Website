<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password — IELTS Vocab Master</title>
<style>
:root{
  --bg:#0b0e14; --surface:#161a23; --surface2:#1e2330; --border:#2a3040;
  --text:#e8eaf0; --muted:#9aa3b5; --accent:#6366f1;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px;
}
.card{
  width:100%; max-width:380px; background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:28px 24px; box-shadow:0 16px 48px rgba(0,0,0,.25);
}
h1{font-size:1.25rem; font-weight:800; margin-bottom:18px; text-align:center;}
.field{display:block; margin-bottom:14px;}
.field span{display:block; margin-bottom:6px; font-size:.82rem; font-weight:700;}
.field input{
  width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text); font-size:.92rem; box-sizing:border-box;
}
.field input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.12);}
button{
  width:100%; padding:11px; border-radius:8px; border:none; background:var(--accent);
  color:#fff; font-size:.92rem; font-weight:700; cursor:pointer;
}
button:disabled{opacity:.6; cursor:not-allowed;}
.msg{
  margin:0 0 14px; padding:9px 12px; border-radius:8px; font-size:.82rem; font-weight:600;
}
.msg.error{background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.35); color:#dc2626;}
.msg.success{background:rgba(99,102,241,.1); border:1px solid rgba(99,102,241,.35); color:var(--text);}
.msg:empty{display:none;}
a{color:var(--accent); font-weight:700; text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <h1>Set a new password</h1>
  <p class="msg" id="msg"></p>
  <form id="resetForm">
    <label class="field"><span>New password</span><input type="password" id="password" autocomplete="new-password" required minlength="8"></label>
    <label class="field"><span>Confirm password</span><input type="password" id="confirm" autocomplete="new-password" required minlength="8"></label>
    <button type="submit" id="submitBtn">Set new password</button>
  </form>
</div>
<script>
const params = new URLSearchParams(location.search);
const token = params.get("token") || "";
const form = document.getElementById("resetForm");
const msg = document.getElementById("msg");

if (!token) {
  form.style.display = "none";
  msg.className = "msg error";
  msg.textContent = "This reset link is missing its token. Please use the link from your email.";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;
  msg.className = "msg";
  msg.textContent = "";

  if (password !== confirm) {
    msg.className = "msg error";
    msg.textContent = "Passwords do not match.";
    return;
  }

  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;
  try {
    const res = await fetch("reset_password.php", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      msg.className = "msg error";
      msg.textContent = data.error || "Could not reset your password.";
      return;
    }
    form.style.display = "none";
    msg.className = "msg success";
    msg.innerHTML = 'Your password has been reset. <a href="../vocab-master.html">Return to the app</a> and sign in.';
  } catch (err) {
    msg.className = "msg error";
    msg.textContent = "Could not reach the server.";
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
